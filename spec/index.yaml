version: "0.2.0"
status: draft
created_at: "2026-07-10"
updated_at: "2026-07-10"

project:
  id: byudzhetirovanie
  name: Бюджетирование
  repository: https://github.com/vladimirmurach-vibe/byudzhetirovanie

business_goal: >
  Заменить трудоёмкую Excel-модель инструментом быстрого пересчёта сценариев
  бюджета строительных объектов с хранением всех версий расчёта, консолидацией
  финансового результата и автоматической загрузкой фактических данных.

solution:
  type: web-application
  description: >
    Веб-система расчёта денежных потоков и финансового результата по
    строительным объектам: создание сценариев бюджета/прогноза (с корректировками)
    для всех объектов или отдельного объекта, оперативный пересчёт (до 20 минут),
    сравнение версий, консолидация на горизонте планирования, отчёты PDF/Excel.

module_registry:
  url: https://github.com/vladimirmurach-vibe/module-registry
  branch: master

