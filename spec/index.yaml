project:
  id: byudzhetirovanie
  name: Бюджетирование
  repository: https://github.com/vladimirmurach-vibe/byudzhetirovanie

business_goal: >
  Обеспечить централизованное планирование, ввод и контроль исполнения бюджета
  подразделений компании с заменой разрозненных Excel-файлов единой веб-системой.

solution:
  type: web-application
  description: >
    Веб-приложение для создания версий бюджета, ввода плановых сумм по статьям
    и центрам затрат, агрегации по иерархиям и контроля план/факт.

