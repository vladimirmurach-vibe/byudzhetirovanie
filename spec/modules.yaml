registry_url: https://github.com/vladimirmurach-vibe/module-registry

modules:
  - id: fastapi-base
    name: Базовое FastAPI приложение
    type: template
    registry_path: templates/fastapi-base
    version: "1.0.0"
    maturity: production
    used_by_requirements: []

  - id: fastapi-crud-generator
    name: Генератор CRUD эндпоинтов
    type: template
    registry_path: templates/fastapi-crud-generator
    version: "1.0.0"
    maturity: production
    used_by_requirements: [REQ-002, REQ-003]

  - id: postgres-storage
    name: Хранилище PostgreSQL
    type: connector
    registry_path: connectors/postgres-storage
    version: "1.0.0"
    maturity: production
    used_by_requirements: [REQ-006]

  - id: auth-jwt
    name: JWT аутентификация
    type: black_box
    registry_path: black_boxes/auth-jwt
    version: "1.0.0"
    maturity: production
    used_by_requirements: [REQ-001]

  - id: react-dashboard-template
    name: Шаблон React-приложения с дашбордом
    type: template
    registry_path: templates/react-dashboard-template
    version: "1.0.0"
    maturity: production
    used_by_requirements: [REQ-007]

  - id: react-crud-pages
    name: Шаблон CRUD-страниц
    type: template
    registry_path: templates/react-crud-pages
    version: "1.0.0"
    maturity: production
    used_by_requirements: [REQ-002, REQ-003]

  - id: mod-pivot-tabulator
    name: Tabulator with Pivot Module
    type: source_code
    registry_path: source_code/mod-pivot-tabulator
    version: "1.0.0"
    maturity: production
    license: MIT
    used_by_requirements: [REQ-004]

  - id: forecast-aggregation
    name: Агрегатор прогнозов по иерархиям
    type: template
    registry_path: templates/forecast-aggregation
    version: "1.0.0"
    maturity: production
    used_by_requirements: [REQ-005]
    note: Адаптируется для агрегации бюджетных строк вместо прогнозов

  - id: mod-chart-echarts
    name: Apache ECharts
    type: source_code
    registry_path: source_code/mod-chart-echarts
    version: "1.0.0"
    maturity: production
    license: Apache-2.0
    used_by_requirements: [REQ-007]

  - id: clean-architecture-pattern
    name: Чистая архитектура
    type: methodology
    registry_path: methodologies/clean-architecture-pattern
    version: "1.0.0"
    maturity: production
    used_by_requirements: []

  - id: basic-security-policy
    name: Базовая политика безопасности
    type: policy
    registry_path: policies/basic-security-policy
    version: "1.0.0"
    maturity: production
    used_by_requirements: [REQ-001, REQ-008]
