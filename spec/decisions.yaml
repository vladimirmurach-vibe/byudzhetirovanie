decisions:
  - id: DEC-001
    title: Выбор табличного компонента для ввода бюджета
    status: accepted
    date: "2026-07-10"
    context: >
      REQ-004 требует интерактивную таблицу с группировкой, агрегацией
      и inline-редактированием плановых сумм.
    alternatives:
      - id: mod-pivot-tabulator
        pros:
          - MIT-лицензия, бесплатно
          - Статус production
          - Виртуализация для больших объёмов
        cons:
          - Нет готового drag-and-drop для настройки pivot
      - id: mod-pivot-ag-grid-react
        pros:
          - Мощный pivot-режим и иерархии
          - Статус production
        cons:
          - Enterprise-функции требуют платной лицензии
          - Привязка к React-экосистеме Ag-Grid
      - id: mod-pivot-handsontable
        pros:
          - Excel-подобный интерфейс
        cons:
          - Статус beta
          - Ограниченная производительность при >50k записей
    decision: mod-pivot-tabulator
    rationale: >
      Tabulator выбран как основной компонент: бесплатная MIT-лицензия,
      статус production и достаточная функциональность для ввода бюджета.
      Ag-Grid остаётся альтернативой при необходимости Enterprise-функций.

  - id: DEC-002
    title: Адаптация модуля forecast-aggregation для бюджета
    status: accepted
    date: "2026-07-10"
    context: >
      В реестре нет специализированного модуля агрегации бюджета;
      forecast-aggregation предоставляет аналогичную логику группировки
      и суммирования по иерархиям.
    alternatives:
      - id: forecast-aggregation
        pros:
          - Готовый AggregationService
          - Проверенная производительность
          - Зависимость от postgres-storage уже учтена
        cons:
          - Терминология прогнозирования требует адаптации
      - id: custom-aggregation
        pros:
          - Полный контроль над доменной моделью
        cons:
          - Дополнительное время разработки
          - Нет готового шаблона в реестре
    decision: forecast-aggregation
    rationale: >
      Переиспользование forecast-aggregation с адаптацией измерений
      и мер сокращает время разработки при сохранении требований
      к производительности.

  - id: DEC-003
    title: Выбор библиотеки визуализации
    status: accepted
    date: "2026-07-10"
    context: REQ-007 требует графики план/факт на дашборде.
    alternatives:
      - id: mod-chart-echarts
        pros:
          - Apache-2.0 лицензия
          - Широкий набор типов графиков
          - Статус production
        cons:
          - Размер бандла ~800KB
      - id: mod-chart-chartjs
        pros:
          - Лёгковеснее
        cons:
          - Менее гибкие иерархические визуализации
    decision: mod-chart-echarts
    rationale: >
      ECharts обеспечивает столбчатые графики план/факт и drill-down
      при бесплатной Apache-2.0 лицензии.

  - id: DEC-004
    title: Отложение workflow согласования
    status: accepted
    date: "2026-07-10"
    context: >
      Постановка не описывает процесс согласования; в реестре нет
      готового модуля workflow.
    decision: defer
    rationale: >
      В MVP статус бюджета меняется вручную бюджетным менеджером.
      Полноценный workflow (REQ-010) перенесён в low priority.
