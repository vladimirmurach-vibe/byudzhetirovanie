rules:
  - id: VAL-001
    name: Обязательные поля спецификации
    scope: index.yaml
    checks:
      - field: project.id
        rule: not_empty
      - field: project.name
        rule: not_empty
      - field: business_goal
        rule: not_empty
      - field: solution.type
        rule: not_empty

  - id: VAL-002
    name: Ссылочная целостность требований
    scope: requirements.yaml
    checks:
      - rule: every_requirement_has_priority
        allowed_values: [high, medium, low]
      - rule: high_requirements_have_acceptance_criteria
      - rule: high_requirements_have_module_candidates
      - rule: entity_refs_exist_in_data_yaml

  - id: VAL-003
    name: Согласованность модулей
    scope: [modules.yaml, architecture.yaml, requirements.yaml]
    checks:
      - rule: architecture_selected_modules_subset_of_modules_yaml
      - rule: modules_yaml_matches_architecture_selected_modules
      - rule: requirement_mapping_modules_in_selected_modules
      - rule: module_registry_paths_valid

  - id: VAL-004
    name: Покрытие приёмочных тестов
    scope: acceptance.yaml
    checks:
      - rule: every_high_requirement_has_acceptance_test
      - rule: acceptance_test_requirement_id_exists

  - id: VAL-005
    name: Валидация данных бюджета
    scope: data
    checks:
      - entity: entity-budget-line
        field: planned_amount
        rule: numeric
        min: 0
      - entity: entity-budget-line
        field: actual_amount
        rule: numeric
        min: 0
        nullable: true
      - entity: entity-budget-line
        field: period
        rule: regex
        pattern: "^\\d{4}-(0[1-9]|1[0-2])$"
      - entity: entity-department
        field: code
        rule: unique
      - entity: entity-cost-center
        field: code
        rule: unique
      - entity: entity-budget-category
        field: code
        rule: unique

  - id: VAL-006
    name: Бизнес-правила бюджета
    scope: business
    checks:
      - rule: budget_status_transitions
        allowed:
          draft: [in_review, archived]
          in_review: [draft, approved, archived]
          approved: [archived]
          archived: []
      - rule: department_head_edit_scope
        description: department_head может изменять только строки своего department_id
      - rule: approved_budget_readonly
        description: Строки бюджета в статусе approved не редактируются

  - id: VAL-007
    name: Безопасность
    scope: security
    policy_ref: basic-security-policy
    checks:
      - rule: jwt_required_for_api
      - rule: https_only_in_production
      - rule: no_secrets_in_source_code

  - id: VAL-008
    name: История версий
    scope: history.yaml
    checks:
      - rule: latest_version_matches_index
      - rule: initial_entry_exists
        version: "0.1.0"
        status: draft
