entries:
  - version: "0.1.0"
    status: draft
    date: "2026-07-10"
    author: AI-архитектор
    summary: >
      Первоначальная спецификация на основе названия проекта.
      Типовой сценарий корпоративного бюджетирования.
    changes:
      - Создана базовая структура spec/ (13 файлов)
    open_gaps:
      - GAP-001

  - version: "0.2.0"
    status: draft
    date: "2026-07-10"
    author: AI-архитектор
    summary: >
      Обновление по постановке заказчика: инструмент быстрого пересчёта
      сценариев бюджета для строительных объектов.
    changes:
      - Переработан business.yaml под строительную отрасль
      - Заменены сущности: строительный объект, сценарий, денежный поток, финансовый результат
      - Сформулированы 14 требований (11 high, 3 medium)
      - Добавлены модули consensus-calculator, adjustment-disaggregation, csv-data-source
      - Обновлены UI-экраны: консолидация, сравнение версий, импорт Excel, загрузка факта
      - Добавлены 11 приёмочных тестов для high-требований
      - Обновлены gaps (Excel-модель, учётные системы, PDF-модуль)
      - Приняты 5 архитектурных решений
    resolved_gaps:
      - "GAP-001 (v0.1.0: отсутствие постановки)"
    open_gaps:
      - GAP-001
      - GAP-002
      - GAP-003
      - GAP-004
      - GAP-005
      - GAP-006

  - version: "0.2.1"
    status: draft
    date: "2026-07-10"
    author: AI-архитектор
    summary: >
      Заказчик не может ответить на открытые вопросы. Gaps переведены
      в статус deferred; разработка MVP разрешена на основе допущений.
    changes:
      - Все customer gaps помечены customer_input: unavailable
      - Добавлены допущения ASM-009..ASM-011
      - Сняты блокировки blocks с требований
      - Добавлен флаг proceed_without_resolution в gaps.yaml
    open_gaps:
      - GAP-003
    deferred_gaps:
      - GAP-001
      - GAP-002
      - GAP-004
      - GAP-005
      - GAP-006
