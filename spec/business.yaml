problem: >
  Бюджетирование ведётся в Excel-файлах: нет единой версии данных, сложно
  согласовывать планы между подразделениями, отсутствует оперативный контроль
  исполнения бюджета.

goal: >
  Создать веб-систему для планирования бюджета, ввода плановых сумм,
  агрегации по организационной структуре и сравнения план/факт.

scope:
  in_scope:
    - Создание и ведение версий бюджета на период (год)
    - Справочники подразделений, центров затрат и статей бюджета
    - Ввод плановых сумм в табличной форме
    - Агрегация бюджета по иерархиям
    - Аутентификация и разграничение доступа по ролям
    - Дашборд с визуализацией план/факт
  out_of_scope:
    - Интеграция с ERP/бухгалтерией (первая версия)
    - Многоуровневый workflow согласования (отложено)
    - Мобильное приложение

stakeholders:
  - id: role-finance-director
    name: Финансовый директор
    responsibilities:
      - Утверждение итогового бюджета компании
      - Контроль исполнения бюджета
    goals:
      - Видеть сводный бюджет по всем подразделениям
      - Сравнивать план и факт в разрезе статей и периодов

  - id: role-budget-manager
    name: Бюджетный менеджер
    responsibilities:
      - Подготовка и ведение версий бюджета
      - Настройка справочников и структуры бюджета
    goals:
      - Быстро собирать бюджет от подразделений
      - Контролировать полноту заполнения

  - id: role-department-head
    name: Руководитель подразделения
    responsibilities:
      - Ввод плановых сумм по своему подразделению
      - Предоставление обоснований отклонений
    goals:
      - Удобно вводить и корректировать бюджет своего ЦФО
      - Видеть итоги по своему подразделению

  - id: role-admin
    name: Администратор системы
    responsibilities:
      - Управление пользователями и ролями
      - Техническое сопровождение
    goals:
      - Обеспечить доступность и безопасность системы

constraints:
  - Веб-доступ через браузер (десктоп)
  - Хранение данных в реляционной СУБД
  - Интерфейс на русском языке
  - Обязательная аутентификация пользователей

success_metrics:
  - id: metric-adoption
    description: Не менее 80% подразделений ведут бюджет в системе вместо Excel
    target: "80%"
  - id: metric-cycle-time
    description: Сокращение цикла подготовки годового бюджета
    target: "на 30%"
