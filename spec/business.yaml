problem: >
  Существует Excel-модель, соответствующая методологическим требованиям заказчика.
  Обновление данных в Excel занимает слишком много времени и трудозатратно.
  Отсутствует быстрый прозрачный пересчёт, сравнение версий и централизованное
  хранение всех версий расчёта.

goal: >
  Реализовать инструмент быстрого пересчёта сценариев бюджета для строительных
  объектов с расчётом денежных потоков, консолидацией финансового результата
  по всем объектам на горизонте планирования и автоматической загрузкой факта
  из учётных систем.

scope:
  in_scope:
    - Расчёт денежных потоков и финансового результата по строительным объектам
    - Создание сценариев бюджета/прогноза с корректировками (все объекты или один)
    - Хранение всех версий расчёта и моментальное сравнение версий
    - Консолидация финансового результата на горизонте от начала строительства
      до завершения последнего объекта
    - Оперативный пересчёт сценариев (целевое время — до 20 минут)
    - Автоматическая загрузка фактических данных из учётных систем
    - Формирование отчётов PDF и Excel для менеджмента и органов управления
    - Импорт исходных данных из Excel-модели заказчика
    - Гарантия полноты данных (все формы → выходные формы → консолидация)
  out_of_scope:
    - Замена учётных систем
    - Мобильное приложение
    - Редактирование методологии расчёта пользователями

stakeholders:
  - id: role-management
    name: Менеджмент
    responsibilities:
      - Рассмотрение консолидированных отчётов
      - Принятие решений на основе сценариев бюджета
    goals:
      - Получать актуальные отчёты PDF/Excel без ручной сборки
      - Сравнивать сценарии и версии бюджета

  - id: role-governance
    name: Органы управления
    responsibilities:
      - Утверждение бюджетных сценариев
      - Контроль исполнения на уровне портфеля объектов
    goals:
      - Видеть консолидированный финансовый результат по всем объектам
      - Иметь прозрачную историю версий расчёта

  - id: role-budget-analyst
    name: Бюджетный аналитик
    responsibilities:
      - Создание и корректировка сценариев бюджета/прогноза
      - Запуск пересчёта и сравнение версий
      - Контроль полноты и корректности данных
    goals:
      - Пересчитывать сценарии быстрее, чем в Excel
      - Создавать сценарий менее трудоёмко, чем в Excel

  - id: role-project-manager
    name: Руководитель строительного объекта
    responsibilities:
      - Ввод и актуализация данных по своему объекту
      - Формирование сценария для конкретного объекта
    goals:
      - Работать со сценарием только своего объекта
      - Видеть денежные потоки и финансовый результат объекта

  - id: role-admin
    name: Администратор системы
    responsibilities:
      - Настройка интеграций с учётными системами
      - Управление пользователями и справочниками
    goals:
      - Обеспечить автоматическую загрузку факта
      - Минимизировать ручной перенос данных из Excel

constraints:
  - Соответствие методологическим требованиям заказчика (наследие Excel-модели)
  - Время пересчёта версии сценария — не более 20 минут
  - Веб-доступ через браузер (десктоп)
  - Хранение всех версий расчёта в системе
  - Интерфейс на русском языке
  - Сроки внедрения — в соответствии с графиком проекта

risks:
  - id: risk-excel-habit
    description: Консервативность пользователей, привычка работать в Excel
    mitigation: Параллельная демонстрация настроенной системы на раннем этапе
  - id: risk-migration
    description: >
      Перенос данных из Excel — отклонения при неполноте или некорректности
      переноса данных из формы в форму
    mitigation: Валидация полноты данных, сверка с эталонной Excel-моделью

success_metrics:
  - id: metric-recalc-time
    description: Время пересчёта версии сценария
    target: "≤ 20 минут"
  - id: metric-version-compare
    description: Сравнение с любой сохранённой версией бюджета
    target: моментальное (без ручной сборки)
  - id: metric-fact-loading
    description: Загрузка фактических данных
    target: автоматическая из учётных систем
  - id: metric-data-completeness
    description: Полнота данных в консолидации
    target: все данные из всех форм отражены в выходных формах

target_state:
  - Актуальные данные по всем проектам внесены в систему
  - Оперативный пересчёт версий (до 20 минут)
  - Моментальное сравнение с любой версией бюджета
  - Автоматическая загрузка факта
  - Автоматические отчёты для менеджмента
  - Гарантированная полнота данных в консолидации
