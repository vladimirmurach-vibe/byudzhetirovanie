gaps:
  - id: GAP-001
    topic: Детальная постановка задачи
    description: >
      Пользователь указал только название проекта «Бюджетирование» без описания
      предметной области, процессов и ограничений. Спецификация построена
      на типовом сценарии корпоративного бюджетирования.
    severity: high
    resolution_needed: >
      Уточнить у заказчика отрасль, количество подразделений, процесс согласования
      и требования к интеграциям.
    blocks: []

  - id: GAP-002
    topic: Источник фактических данных
    description: >
      Не определено, откуда поступают фактические суммы: ручной ввод,
      импорт из 1С/SAP или API внешней системы.
    severity: high
    resolution_needed: Выбрать источник факта и формат обмена данными.
    blocks: [REQ-007]

  - id: GAP-003
    topic: Процесс согласования бюджета
    description: >
      Не описаны этапы, участники и правила перехода между статусами бюджета.
    severity: medium
    resolution_needed: Описать workflow согласования или подтвердить ручную смену статуса.
    blocks: [REQ-010]

  - id: GAP-004
    topic: Структура статей бюджета
    description: >
      Не предоставлен классификатор статей (ПБУ, управленческий, отраслевой).
    severity: medium
    resolution_needed: Предоставить начальный справочник статей или шаблон.
    blocks: [REQ-003]

  - id: GAP-005
    topic: Количество пользователей и нагрузка
    description: >
      Не указаны ожидаемое число пользователей и объём строк бюджета.
    severity: low
    resolution_needed: Уточнить для валидации производительности.
    blocks: [REQ-005]

  - id: GAP-006
    topic: Требования к отчётности
    description: >
      Не определён перечень обязательных отчётов помимо дашборда план/факт.
    severity: low
    resolution_needed: Согласовать список отчётов для следующей итерации.
    blocks: [REQ-009]
