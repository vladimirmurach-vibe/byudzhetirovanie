gaps:
  - id: GAP-001
    topic: Excel-модель заказчика
    status: deferred
    customer_input: unavailable
    description: >
      Файл Excel-модели и описание входных/выходных форм не предоставлены.
      Заказчик не может ответить на этот вопрос на текущем этапе.
    severity: high
    resolution_needed: >
      Получить Excel-модель на этапе настройки/внедрения (до приёмочных тестов REQ-005).
    mitigation: >
      Реализовать конфигурируемую схему входных форм (entity-input-form);
      наполнить справочник форм совместно с заказчиком при первой настройке системы.
    blocks: []

  - id: GAP-002
    topic: Учётные системы-источники факта
    status: deferred
    customer_input: unavailable
    description: >
      Конкретные учётные системы, формат и периодичность обмена не определены.
      Заказчик не может ответить на этот вопрос на текущем этапе.
    severity: high
    resolution_needed: >
      Уточнить при внедрении; до этого — универсальный файловый импорт.
    mitigation: >
      REQ-009 реализуется через csv-data-source с настраиваемым маппингом колонок
      и ручным/плановым импортом файлов; прямое API — отдельная итерация.
    blocks: []

  - id: GAP-003
    topic: Модуль генерации PDF-отчётов
    status: open
    customer_input: not_required
    description: >
      В module-registry отсутствует готовый модуль PDF-генерации.
      Это технический gap, не требующий ответа заказчика.
    severity: medium
    resolution_needed: Разработать кастомный PDF-сервис (см. DEC-004, ASM-004).
    mitigation: Кастомная реализация на WeasyPrint/ReportLab.
    blocks: []

  - id: GAP-004
    topic: Шаблоны отчётов для менеджмента
    status: deferred
    customer_input: unavailable
    description: >
      Макеты отчётов PDF/Excel не согласованы.
      Заказчик не может ответить на этот вопрос на текущем этапе.
    severity: medium
    resolution_needed: Согласовать макеты на демонстрации настроенной системы.
    mitigation: >
      Использовать отчёт по умолчанию: консолидированный финансовый результат
      (выручка, затраты, прибыль) по объектам и периодам; доработать после демо.
    blocks: []

  - id: GAP-005
    topic: Объём портфеля и нагрузка
    status: deferred
    customer_input: unavailable
    description: >
      Точное количество объектов, строк и пользователей не указано.
      Заказчик не может ответить на этот вопрос на текущем этапе.
    severity: medium
    resolution_needed: Уточнить при нагрузочном тестировании перед промышленной эксплуатацией.
    mitigation: >
      Принять допущение ASM-007: до 50 объектов, до 100 000 строк денежных потоков,
      до 20 одновременных пользователей для валидации SLA 20 минут.
    blocks: []

  - id: GAP-006
    topic: График проекта и дата демонстрации
    status: deferred
    customer_input: unavailable
    description: >
      Конкретные даты демонстрации и внедрения не предоставлены.
      Заказчик не может ответить на этот вопрос на текущем этапе.
    severity: low
    resolution_needed: Согласовать график с командой проекта при старте разработки.
    mitigation: >
      Поэтапная поставка: MVP (сценарии, пересчёт, консолидация) →
      импорт/факт → отчёты → приёмка.
    blocks: []

proceed_without_resolution: true
proceed_note: >
  Спецификация допускает старт разработки MVP. Все gaps с customer_input: unavailable
  закрываются допущениями (assumptions.yaml) и уточняются на этапе настройки
  и демонстрации системы заказчику.
