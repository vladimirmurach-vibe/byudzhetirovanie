gaps:
  - id: GAP-001
    topic: Excel-модель заказчика
    description: >
      Не предоставлен файл Excel-модели и описание входных/выходных форм.
      Без неё невозможно верифицировать корректность расчётов и импорта.
    severity: high
    resolution_needed: >
      Предоставить Excel-модель, описание форм и эталонные результаты
      расчёта для сверки.
    blocks: [REQ-005, REQ-012, REQ-013]

  - id: GAP-002
    topic: Учётные системы-источники факта
    description: >
      Не указаны конкретные учётные системы, формат и периодичность
      обмена данными для автоматической загрузки факта.
    severity: high
    resolution_needed: >
      Определить системы-источники (1С, SAP и др.), формат выгрузки
      и расписание загрузки.
    blocks: [REQ-009]

  - id: GAP-003
    topic: Модуль генерации PDF-отчётов
    description: >
      В module-registry отсутствует готовый модуль для формирования
      PDF-отчётов. REQ-010 требует PDF и Excel.
    severity: medium
    resolution_needed: >
      Разработать кастомный PDF-сервис или добавить модуль в реестр.
    blocks: [REQ-010]

  - id: GAP-004
    topic: Шаблоны отчётов для менеджмента
    description: >
      Не предоставлены макеты отчётов PDF/Excel для менеджмента
      и органов управления.
    severity: medium
    resolution_needed: Согласовать макеты и состав показателей отчётов.
    blocks: [REQ-010]

  - id: GAP-005
    topic: Объём портфеля и нагрузка
    description: >
      Не указано точное количество строительных объектов, строк данных
      и одновременных пользователей для валидации SLA 20 минут.
    severity: medium
    resolution_needed: Уточнить объёмы для нагрузочного тестирования.
    blocks: [REQ-006]

  - id: GAP-006
    topic: График проекта и дата демонстрации
    description: >
      Указано «в соответствии с графиком проекта» и ранняя демонстрация,
      но конкретные даты не предоставлены.
    severity: low
    resolution_needed: Предоставить график с датой первой демонстрации.
    blocks: []
